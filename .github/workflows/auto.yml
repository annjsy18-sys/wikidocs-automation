name: Blog Auto Poster

on:
  schedule:
    - cron: '1 15 * * *'
  workflow_dispatch:

jobs:
  run-blog-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          npm install -g @anthropic-ai/claude-code

      - name: Run main script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          WIKIDOCS_API_KEY: ${{ secrets.WIKIDOCS_API_KEY }}
        run: |
          chmod +x daily_batch.sh run.sh
          set -e
          ./daily_batch.sh "01" 10 || (echo "=== LOG FILE CONTENT ===" && cat 01/daily_log_*.txt 2>/dev/null || echo "No log file found")
